<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>My Predictions</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list *ngIf="loading">
    <ion-item *ngFor="let i of [1,2,3]">
      <ion-label>
        <h2><ion-skeleton-text [animated]="true" style="width: 65%"></ion-skeleton-text></h2>
        <p><ion-skeleton-text [animated]="true" style="width: 50%"></ion-skeleton-text></p>
        <p><ion-skeleton-text [animated]="true" style="width: 55%"></ion-skeleton-text></p>
        <p><ion-skeleton-text [animated]="true" style="width: 40%"></ion-skeleton-text></p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let p of predictions">
      <ion-label>
        <h2>{{ p.event_name }} — {{ p.market_type }}</h2>
        <p>Selection: {{ p.selection }} • Stake: {{ p.stake }}</p>
        <p>Status: {{ p.prediction_status }} • Multiplier: {{ p.multiplier }}</p>
        <p>Submitted: {{ p.submitted_at | date:'MMM d, y – h:mm a' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-text *ngIf="!loading && predictions.length === 0">
    No predictions yet.
  </ion-text>

</ion-content>
