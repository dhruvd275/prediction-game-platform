<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/events"></ion-back-button>
    </ion-buttons>
    <ion-title>Markets</ion-title>
    <ion-note slot="end" class="ion-padding-end" *ngIf="credits !== null">
      Credits: {{ credits }}
    </ion-note>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="event">
    <h2>{{ event.name }}</h2>
    <p>{{ event.sport }} • {{ event.starts_at | date:'MMM d, y – h:mm a' }}</p>
  </div>

  <ion-list *ngIf="loading">
    <ion-item *ngFor="let i of [1,2,3,4]">
      <ion-label>
        <h2><ion-skeleton-text [animated]="true" style="width: 50%"></ion-skeleton-text></h2>
        <p><ion-skeleton-text [animated]="true" style="width: 70%"></ion-skeleton-text></p>
        <p><ion-skeleton-text [animated]="true" style="width: 45%"></ion-skeleton-text></p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let m of markets" button detail [disabled]="m.status !== 'OPEN'" (click)="openPredict(m)">
      <ion-label>
        <h2>{{ m.type }}</h2>
        <p>Multiplier: {{ m.multiplier }} • Status: {{ m.status }}</p>
        <p>Cutoff: {{ m.cutoff_at | date:'MMM d, y – h:mm a' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
