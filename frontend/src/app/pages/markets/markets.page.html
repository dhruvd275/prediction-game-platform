<ion-header>
  <ion-toolbar>
    <ion-title>Markets</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="event">
    <h2>{{ event.name }}</h2>
    <p>{{ event.sport }} • {{ event.starts_at }}</p>
  </div>

  <ion-text *ngIf="loading">Loading markets...</ion-text>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let m of markets" button detail [disabled]="m.status !== 'OPEN'" (click)="openPredict(m)">
      <ion-label>
        <h2>{{ m.type }}</h2>
        <p>Multiplier: {{ m.multiplier }} • Status: {{ m.status }}</p>
        <p>Cutoff: {{ m.cutoff_at }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
