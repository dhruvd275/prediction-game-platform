<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/events"></ion-back-button>
    </ion-buttons>
    <ion-title>Submit Prediction</ion-title>
    <ion-note slot="end" class="ion-padding-end" *ngIf="credits !== null">
      Credits: {{ credits }}
    </ion-note>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="market">
    <h2>{{ market.event_name }}</h2>
    <p>Market: {{ market.market_type }}</p>
    <p>Multiplier: {{ market.multiplier }}x</p>
    <p>Status: {{ market.status }}</p>
  </div>

  <ion-item *ngIf="options.length > 0">
    <ion-select
      label="Select Driver"
      labelPlacement="floating"
      interface="popover"
      [(ngModel)]="selection">
      <ion-select-option *ngFor="let o of options" [value]="o.value">
        {{ o.label }} ({{ o.value }})
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item *ngIf="options.length === 0">
    <ion-input
      label="Selection (e.g., VER)"
      labelPlacement="floating"
      [(ngModel)]="selection"
    ></ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      type="number"
      label="Stake"
      labelPlacement="floating"
      [(ngModel)]="stake"
    ></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="submit()" [disabled]="loading">
    {{ loading ? 'Submitting...' : 'Submit' }}
  </ion-button>

</ion-content>
