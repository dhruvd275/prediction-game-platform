<ion-content [fullscreen]="true" class="events-content">

  <!-- TOP NAV -->
  <nav class="top-nav">
    <div class="nav-brand" (click)="goHome()">
      <div class="logo-mini">B</div>
      <span class="nav-name">BOLDTAKE</span>
    </div>

    <div class="nav-links" [class.open]="menuOpen">
      <a class="active" (click)="goEvents(); menuOpen = false">Events</a>
      <a (click)="goHistory(); menuOpen = false">Predictions</a>
      <a (click)="goCreditLog(); menuOpen = false">Credit Log</a>
      <a (click)="goLeaderboard(); menuOpen = false">Leaderboard</a>
    </div>

    <div class="nav-actions">
      <button class="icon-btn" (click)="logout()" title="Logout">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
      <button class="icon-btn menu-toggle" (click)="toggleMenu()">
        <ion-icon name="menu-outline"></ion-icon>
      </button>
    </div>
  </nav>

  <!-- BODY -->
  <div class="events-body">

    <div class="page-header">
      <h1 class="page-title">Events <span class="count">({{ events.length }})</span></h1>
    </div>

    <div class="filter-tabs">
      <button [class.active]="filter === 'all'" (click)="setFilter('all')">All</button>
      <button [class.active]="filter === 'upcoming'" (click)="setFilter('upcoming')">Upcoming</button>
      <button [class.active]="filter === 'past'" (click)="setFilter('past')">Past</button>
    </div>

    <ion-text color="danger" *ngIf="errorMessage">
      <p>{{ errorMessage }}</p>
    </ion-text>

    <!-- LOADING SKELETONS -->
    <div class="events-grid" *ngIf="loading">
      <div class="event-card" *ngFor="let i of [1,2,3]">
        <ion-skeleton-text [animated]="true" style="width: 40px; height: 20px; border-radius: 6px;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width: 80%; height: 24px; margin-top: 16px;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width: 50%; height: 16px; margin-top: 8px;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width: 35%; height: 14px; margin-top: 16px;"></ion-skeleton-text>
      </div>
    </div>

    <!-- EVENT CARDS -->
    <div class="events-grid" *ngIf="!loading && events.length > 0">
      <div class="event-card" *ngFor="let e of events" (click)="openMarkets(e.id)">
        <span class="sport-badge">{{ e.sport }}</span>
        <h2 class="event-name">{{ e.name }}</h2>
        <div class="event-meta">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>{{ e.starts_at | date:'MMM d, y' }}</span>
        </div>
        <div class="event-meta">
          <ion-icon name="time-outline"></ion-icon>
          <span>{{ e.starts_at | date:'h:mm a' }}</span>
        </div>
        <div class="event-footer">
          <ion-icon name="flag-outline"></ion-icon>
          <span>{{ e.market_count }} markets</span>
        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" *ngIf="!loading && events.length === 0 && !errorMessage">
      <p>No {{ filter }} events found.</p>
    </div>

  </div>

</ion-content>
