<ion-content [fullscreen]="true" class="admin-content">

  <nav class="top-nav">
    <div class="nav-brand">
      <div class="logo-mini">
        <ion-icon name="settings-outline"></ion-icon>
      </div>
      <span class="nav-name">ADMIN</span>
    </div>
    <button class="icon-btn" (click)="logout()" title="Logout">
      <ion-icon name="log-out-outline"></ion-icon>
    </button>
  </nav>

  <div class="admin-body">

    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Platform overview</p>
    </div>

    <div class="stats-grid" *ngIf="stats">
      <div class="stat-card users">
        <ion-icon name="people-outline"></ion-icon>
        <p class="stat-label">Total Users</p>
        <p class="stat-value">{{ stats.total_users }}</p>
      </div>
      <div class="stat-card events">
        <ion-icon name="calendar-outline"></ion-icon>
        <p class="stat-label">Total Events</p>
        <p class="stat-value">{{ stats.total_events }}</p>
      </div>
      <div class="stat-card predictions">
        <ion-icon name="analytics-outline"></ion-icon>
        <p class="stat-label">Predictions</p>
        <p class="stat-value">{{ stats.total_predictions }}</p>
      </div>
      <div class="stat-card open">
        <ion-icon name="flash-outline"></ion-icon>
        <p class="stat-label">Markets Open</p>
        <p class="stat-value">{{ stats.markets_open }}</p>
      </div>
      <div class="stat-card locked">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <p class="stat-label">Markets Locked</p>
        <p class="stat-value">{{ stats.markets_locked }}</p>
      </div>
      <div class="stat-card resolved">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <p class="stat-label">Markets Resolved</p>
        <p class="stat-value">{{ stats.markets_resolved }}</p>
      </div>
    </div>

    <div class="actions-row">
      <button class="action-card" (click)="goMarkets()">
        <ion-icon name="settings-outline"></ion-icon>
        <h3>Manage Markets</h3>
        <p>Lock and resolve markets</p>
      </button>
      <button class="action-card" (click)="goCreateEvent()">
        <ion-icon name="add-circle-outline"></ion-icon>
        <h3>Create Event</h3>
        <p>Add a new event with markets</p>
      </button>
    </div>

  </div>
</ion-content>
