<ion-content [fullscreen]="true" class="register-content" [style.--background]="'url(assets/bg-space.png) center center / cover no-repeat'">
  
  <div class="register-wrapper">

    <div class="brand">
      <div class="logo-mark">B</div>
      <h1 class="brand-name">BOLDTAKE</h1>
      <p class="tagline">Beat your friends</p>
    </div>

    <div class="register-card">

      <h2 class="card-title">Create Account</h2>

      <ion-text color="danger" *ngIf="errorMessage">
        <p class="error-msg">{{ errorMessage }}</p>
      </ion-text>

      <ion-item lines="none" class="input-item">
        <ion-input
          label="Email"
          labelPlacement="floating"
          type="email"
          [(ngModel)]="email"
          (keyup.enter)="register()">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-input
          label="Username"
          labelPlacement="floating"
          [(ngModel)]="username"
          (keyup.enter)="register()">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          label="Password"
          labelPlacement="floating"
          [(ngModel)]="password"
          (keyup.enter)="register()">
        </ion-input>
        <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword">
          <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
        </ion-button>
      </ion-item>

      <div *ngIf="password.length > 0" class="rules-list">
        <p *ngFor="let rule of rules" [class.met]="rule.met" [class.unmet]="!rule.met">
          {{ rule.met ? '✓' : '✗' }} {{ rule.label }}
        </p>
      </div>

      <ion-button expand="block" class="register-btn" (click)="register()" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </ion-button>

      <ion-button expand="block" fill="clear" class="login-link" (click)="goLogin()">
        Already have an account? <strong>&nbsp;Login</strong>
      </ion-button>

    </div>

  </div>

</ion-content>
