<ion-header>
  <ion-toolbar>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Email"
      labelPlacement="floating"
      [(ngModel)]="email">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      type="password"
      label="Password"
      labelPlacement="floating"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button expand="block" (click)="register()">
    Register
  </ion-button>

  <ion-button expand="block" fill="clear" (click)="goLogin()">
    Already have an account? Login
  </ion-button>

</ion-content>
