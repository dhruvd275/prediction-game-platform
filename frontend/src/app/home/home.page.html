<ion-header>
  <ion-toolbar>
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="user">

    <h2>Welcome</h2>

    <p>Email: {{ user.email }}</p>

    <p>Credits: {{ user.credits }}</p>

    <ion-button expand="block" (click)="goEvents()">
      View Events
    </ion-button>

  </div>
</ion-content>
